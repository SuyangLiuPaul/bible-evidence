<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>圣经与科学实证档案 | Biblical Evidence Archive</title>
    <meta name="description" content="A rigorous academic examination of archaeological, manuscript, and historical evidence that intersects with biblical accounts." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Biblical Evidence Archive" />
    <meta property="og:description" content="A rigorous academic examination of archaeological, manuscript, and historical evidence that intersects with biblical accounts." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://bible-evidence.netlify.app" />

    <!-- Twitter Card — using summary_large_image with og-image -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Biblical Evidence Archive" />
    <meta name="twitter:description" content="101 pieces of archaeological, manuscript, scientific, and historical evidence intersecting with biblical accounts." />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Theme + iOS PWA meta -->
    <meta name="theme-color" content="#0A369D" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Bible Evidence" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Icons — covers Safari (mac/iOS), Chrome (Android/desktop),
         Edge (Windows tile), and the legacy favicon.ico fallback. -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#0A369D" />
    <meta name="msapplication-TileImage" content="/mstile-150x150.png" />
    <meta name="msapplication-TileColor" content="#0A369D" />

    <!-- PWA manifest (generated by VitePWA at build time) -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      /* Apple glassmorphism splash screen */
      body {
        margin: 0;
        background: linear-gradient(135deg, #e8edf5 0%, #f5f0e8 35%, #f0f5f0 65%, #f5f2ea 100%);
        background-attachment: fixed;
        color: #2C2820;
      }
      #app-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: 'Inter', 'Noto Sans SC', system-ui, sans-serif;
      }
      #app-loader .icon-glass {
        width: 88px; height: 88px;
        border-radius: 24px;
        background: rgba(255,255,255,0.55);
        backdrop-filter: blur(40px) saturate(180%);
        -webkit-backdrop-filter: blur(40px) saturate(180%);
        border: 1px solid rgba(255,255,255,0.5);
        box-shadow: 0 8px 32px rgba(0,0,0,0.06), inset 0 1px 0 rgba(255,255,255,0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: _iconIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        margin-bottom: 24px;
      }
      #app-loader .icon-glass img,
      #app-loader .icon-glass svg {
        width: 52px; height: 52px;
      }
      #app-loader .spinner-ring {
        width: 28px; height: 28px;
        border: 2px solid rgba(10,54,157,0.12);
        border-top-color: #0A369D;
        border-radius: 50%;
        animation: _spin 0.8s linear infinite;
        margin-bottom: 20px;
      }
      #app-loader .title {
        color: #2D3142;
        font-size: 17px;
        font-weight: 600;
        letter-spacing: 0.02em;
        margin-bottom: 6px;
        opacity: 0;
        animation: _fadeIn 0.5s ease forwards 0.2s;
      }
      #app-loader .subtitle {
        color: #8A7E6B;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        margin: 0;
        opacity: 0;
        animation: _fadeIn 0.5s ease forwards 0.35s;
      }
      @keyframes _spin { to { transform: rotate(360deg); } }
      @keyframes _fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes _iconIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loader">
        <div class="icon-glass">
          <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#0A369D"/>
                <stop offset="100%" stop-color="#1A50C8"/>
              </linearGradient>
              <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#E8A317"/>
                <stop offset="50%" stop-color="#F5C842"/>
                <stop offset="100%" stop-color="#E8A317"/>
              </linearGradient>
            </defs>
            <rect width="512" height="512" rx="96" fill="url(#bg)"/>
            <!-- Magnifying glass body -->
            <circle cx="230" cy="220" r="120" fill="none" stroke="#FDFBF7" stroke-width="32" opacity="0.9"/>
            <!-- Cross inside magnifying glass -->
            <rect x="214" y="148" width="32" height="144" rx="8" fill="url(#gold)"/>
            <rect x="158" y="204" width="144" height="32" rx="8" fill="url(#gold)"/>
            <!-- Handle -->
            <line x1="316" y1="308" x2="400" y2="392" stroke="#FDFBF7" stroke-width="36" stroke-linecap="round" opacity="0.9"/>
          </svg>
        </div>
        <div class="spinner-ring"></div>
        <p class="title">Bible Evidence</p>
        <p class="subtitle">Loading Archive</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
