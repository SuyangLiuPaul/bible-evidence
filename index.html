<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>圣经与科学实证档案 | Biblical Evidence Archive</title>
    <meta name="description" content="A rigorous academic examination of archaeological, manuscript, and historical evidence that intersects with biblical accounts." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      /* Prevent white flash before React hydrates — match site light theme */
      body {
        margin: 0;
        background: #FDFBF7;
        color: #2C2820;
      }
      /* Loading screen inside #root — React replaces on mount */
      #app-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: 'Playfair Display', Georgia, serif;
      }
      #app-loader .spinner {
        width: 44px; height: 44px;
        border: 3px solid rgba(232,163,23,0.2);
        border-top-color: #E8A317;
        border-radius: 50%;
        animation: _spin 0.8s linear infinite;
        margin-bottom: 24px;
      }
      #app-loader p {
        color: #8A7E6B;
        font-size: 13px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        margin: 0;
      }
      @keyframes _spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-loader">
        <div class="spinner"></div>
        <p>Loading Archive…</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
