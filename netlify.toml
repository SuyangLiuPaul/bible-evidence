[build]
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Server-side Gemini proxy. The client posts the same body it used to
# send to Gemini directly; this function forwards it and only inserts
# the API key (kept in Netlify env, never in the public bundle).
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback — all routes serve index.html EXCEPT the function path
# and the SW / manifest paths above (they're matched by Netlify's
# function routing before this catch-all fires).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# PWA manifest must have correct Content-Type
[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

# Service worker must not be cached
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
