<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1A50C8"/>
      <stop offset="100%" stop-color="#0A369D"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="100%" stop-color="#E8A317"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Glass shine overlay -->
  <rect width="512" height="512" rx="108" fill="url(#shine)" opacity="0.5"/>
  <!-- Magnifying glass -->
  <circle cx="232" cy="232" r="100" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="18"/>
  <circle cx="232" cy="232" r="72" fill="rgba(255,255,255,0.08)"/>
  <!-- Lens glare -->
  <ellipse cx="205" cy="205" rx="30" ry="18" fill="rgba(255,255,255,0.15)" transform="rotate(-35 205 205)"/>
  <!-- Handle -->
  <line x1="303" y1="303" x2="380" y2="380" stroke="rgba(255,255,255,0.9)" stroke-width="18" stroke-linecap="round"/>
  <!-- Cross inside lens -->
  <rect x="222" y="195" width="20" height="74" rx="10" fill="url(#gold)"/>
  <rect x="195" y="222" width="74" height="20" rx="10" fill="url(#gold)"/>
</svg>
